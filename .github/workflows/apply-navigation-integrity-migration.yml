name: Apply navigation integrity migration

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - "scripts/apply_navigation_integrity_migration.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply migration
        run: python scripts/apply_navigation_integrity_migration.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/UI_RULES.md docs/APP_MAP.md docs/SCREENS.yaml docs/ROUTES.yaml docs/ACTIONS.yaml
          if git diff --cached --quiet; then
            echo "No migration changes."
          else
            git commit -m "Fix navigation graph and canonical bottom tabs"
            git push
          fi
