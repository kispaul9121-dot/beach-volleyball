name: Apply player picker registry

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - .github/workflows/apply-player-picker-registry.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile
          fetch-depth: 0

      - name: Apply player picker registry migration
        run: python scripts/apply_player_picker_registry.py

      - name: Commit synchronized architecture
        run: |
          if git diff --quiet; then
            echo "No migration changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SCREENS.yaml docs/ROUTES.yaml docs/ACTIONS.yaml docs/PLAYER_DIRECTORY.yaml docs/DECISIONS.md docs/TEST_SCENARIOS.md AGENTS.md
          git commit -m "Register player picker flow"
          git push origin HEAD:architecture/v2-multi-profile
