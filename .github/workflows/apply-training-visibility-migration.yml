name: Apply training visibility migration

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - .github/workflows/apply-training-visibility-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile
          fetch-depth: 0

      - name: Apply training visibility migration
        run: python scripts/apply_training_visibility_migration.py

      - name: Commit synchronized architecture
        run: |
          if git diff --quiet; then
            echo "No migration changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs/PLAYER_DIRECTORY.yaml docs/ARCHITECTURE_AUDIT.md docs/TEST_SCENARIOS.md docs/DATA_MODEL.md docs/DECISIONS.md docs/screens/play/main.md docs/screens/profile/my-trainings.md docs/screens/chats/details.md docs/screens/shared/training-create.md docs/screens/shared/training-manage.md docs/screens/shared/training-details.md
          git commit -m "Make training visibility apply to entire event"
          git push origin HEAD:architecture/v2-multi-profile
