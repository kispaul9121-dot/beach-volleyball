name: Migrate games and camps catalog

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - scripts/migrate_games_camps_catalog.py
      - .github/workflows/migrate-games-camps-catalog.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Apply architecture migration
        run: python scripts/migrate_games_camps_catalog.py

      - name: Regenerate readiness audit
        run: python scripts/generate_screen_readiness.py

      - name: Commit migrated architecture
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace Events and Clubs with Games and Camps" || exit 0
          git push
