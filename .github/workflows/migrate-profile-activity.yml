name: Migrate profile activity

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - "scripts/migrate_profile_activity.py"
      - ".github/workflows/migrate-profile-activity.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Apply migration
        run: python scripts/migrate_profile_activity.py

      - name: Commit architecture changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs scripts/validate_profile_activity.py .github/workflows/validate-architecture.yml
          if git diff --cached --quiet; then
            echo "Profile activity migration is already current."
          else
            git commit -m "Move participation and management to Profile"
            git push origin architecture/v2-multi-profile
          fi
