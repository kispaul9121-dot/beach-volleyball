name: Migrate profile and trainer flow

on:
  push:
    branches:
      - "architecture/**"
    paths:
      - "scripts/migrate_profile_trainer_flow.py"
      - ".github/workflows/migrate-profile-trainer-flow.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Apply architecture migration
        run: python scripts/migrate_profile_trainer_flow.py

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md README.md docs scripts/validate_navigation.py scripts/validate_design_system.py
          if git diff --cached --quiet; then
            echo "Migration already applied."
          else
            git commit -m "Update profile tabs and trainer relationships"
            git push
          fi
