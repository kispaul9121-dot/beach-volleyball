name: Migrate profile and trainer relationships

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - scripts/migrate_profile_trainer_relationships.py
      - .github/workflows/migrate-profile-trainer-relationships.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply migration
        run: python scripts/migrate_profile_trainer_relationships.py

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Regenerate readiness table
        run: python scripts/generate_screen_readiness.py

      - name: Validate architecture
        run: |
          python scripts/validate_architecture.py
          python scripts/validate_navigation.py
          python scripts/validate_design_system.py
          python scripts/generate_screen_readiness.py --check

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes."
          else
            git commit -m "Rename tabs and add player trainer relationships"
            git push
          fi
