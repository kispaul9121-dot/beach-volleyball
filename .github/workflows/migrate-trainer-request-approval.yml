name: Migrate trainer request approval

on:
  push:
    branches:
      - architecture/v2-multi-profile
    paths:
      - scripts/migrate_trainer_request_approval.py
      - .github/workflows/migrate-trainer-request-approval.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: architecture/v2-multi-profile

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Apply migration
        run: python scripts/migrate_trainer_request_approval.py

      - name: Refresh screen readiness
        run: python scripts/generate_screen_readiness.py

      - name: Commit migration results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs README.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Require trainer approval for player requests"
            git push
          fi
