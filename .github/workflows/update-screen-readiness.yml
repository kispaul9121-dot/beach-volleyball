name: Update screen readiness

on:
  push:
    branches:
      - "architecture/**"
    paths:
      - "docs/SCREENS.yaml"
      - "docs/ROUTES.yaml"
      - "docs/ACTIONS.yaml"
      - "docs/screens/**"
      - "scripts/generate_screen_readiness.py"
      - "scripts/requirements.txt"
      - ".github/workflows/update-screen-readiness.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Generate readiness matrix
        run: python scripts/generate_screen_readiness.py

      - name: Commit generated audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SCREEN_READINESS.md docs/SCREEN_READINESS.yaml
          if git diff --cached --quiet; then
            echo "Readiness audit is already current."
          else
            git commit -m "Update screen readiness audit"
            git push
          fi
