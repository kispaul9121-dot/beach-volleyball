name: Validate architecture

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "scripts/validate_architecture.py"
      - "scripts/validate_navigation.py"
      - "scripts/validate_design_system.py"
      - "scripts/validate_profile_activity.py"
      - "scripts/fix_profile_activity_fallbacks.py"
      - "scripts/generate_screen_readiness.py"
      - "scripts/requirements.txt"
      - ".github/workflows/validate-architecture.yml"
  push:
    branches:
      - main
      - "architecture/**"
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "scripts/validate_architecture.py"
      - "scripts/validate_navigation.py"
      - "scripts/validate_design_system.py"
      - "scripts/validate_profile_activity.py"
      - "scripts/fix_profile_activity_fallbacks.py"
      - "scripts/generate_screen_readiness.py"
      - "scripts/requirements.txt"
      - ".github/workflows/validate-architecture.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-profile-activity-stack:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Fix Profile activity stack and fallbacks
        run: python scripts/fix_profile_activity_fallbacks.py

      - name: Regenerate readiness matrix
        run: python scripts/generate_screen_readiness.py

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows/validate-architecture.yml
          git add docs
          if git diff --cached --quiet; then
            echo "Profile activity stack is already current."
          else
            git commit -m "Attach personal activity screens to Profile"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Validate screens, routes and actions
        run: python scripts/validate_architecture.py

      - name: Validate navigation graph and immutable bottom tabs
        run: python scripts/validate_navigation.py

      - name: Validate dark-first cross-platform design system
        run: python scripts/validate_design_system.py

      - name: Validate Profile activity and discovery boundaries
        run: python scripts/validate_profile_activity.py

      - name: Verify screen readiness table is current
        run: python scripts/generate_screen_readiness.py --check
