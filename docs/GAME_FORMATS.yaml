version: 3

formats:
  standard_2x2:
    title: 2×2
    participant_unit: individual_or_fixed_pair
    players_on_court: 4
    team_size: 2
    capacity:
      organizer_enters_participant_capacity: true
      minimum_players_per_court: 4
      may_exceed_active_players_for_rotation_or_reserve: true
      must_not_exceed_venue_limit: true
    configuration:
      sets: configurable
      points_per_set: configurable
      fixed_pairs: configurable
      rating_effect: configurable
    scoring_ui:
      primary: set_score_table
      rows: sets
      columns:
      - pair_or_team_a
      - pair_or_team_b
      statistics:
      - match_winner
      - sets_won
      - points_for
      - points_against
      - point_difference

  standard_4x4:
    title: 4×4
    participant_unit: individual_or_fixed_team
    players_on_court: 8
    team_size: 4
    capacity:
      organizer_enters_participant_capacity: true
      minimum_players_per_court: 8
      may_exceed_active_players_for_substitutions_or_reserve: true
      must_not_exceed_venue_limit: true
    configuration:
      sets: configurable
      points_per_set: configurable
      substitutions: configurable
      rating_effect: configurable
    scoring_ui:
      primary: set_score_table
      rows: sets
      columns:
      - team_a
      - team_b
      statistics:
      - match_winner
      - sets_won
      - points_for
      - points_against
      - point_difference

  rotation_five:
    title: Ротация пяти игроков
    participant_unit: individual
    court_group_size: 5
    players_on_court: 4
    resting_players_per_court: 1
    canonical_round_count: 5
    capacity_formula: court_count_times_5
    capacity:
      organizer_enters_participant_capacity: true
      exact_multiple_of: 5
      maximum_formula: reserved_court_count_times_5
      must_not_exceed_venue_limit: true
      publish_blocked_when_rule_fails: true
    purpose: За пять раундов каждый игрок один раз отдыхает и по одному разу играет в паре с каждым другим игроком своей пятёрки.
    invariants:
    - each_group_contains_exactly_5_players
    - each_round_contains_4_active_and_1_resting_player
    - each_player_rests_exactly_once_in_5_rounds
    - each_player_partners_each_other_player_exactly_once
    - no_player_appears_on_two_courts_in_same_round
    per_game_configuration:
    - court_count
    - participant_capacity
    - points_per_round
    - scoring_model
    - initial_grouping
    - movement_between_courts
    - rating_effect
    movement_between_courts:
      values:
      - none
      - ranking_based_after_cycle
      - organizer_manual
      note: Переход между кортами — настройка экземпляра, а не отдельный формат.
    results:
      supported_models:
        individual_points: Очки каждого игрока суммируются по раундам.
        wins_and_point_difference: Победы, затем разница очков.
        custom_season_points: Правило сезона.
    scoring_ui:
      primary: round_and_court_cards
      each_card:
      - round_number
      - court
      - pair_a
      - pair_b
      - resting_player
      - score_inputs
      aggregate: individual_standings_table
      statistics:
      - wins
      - points_for
      - points_against
      - point_difference
      - total_personal_points
      - rank
    generated_views:
      participant:
      - current_court
      - current_partner
      - opponents
      - resting_round
      - personal_points
      organizer:
      - all_courts
      - all_rounds
      - conflicts
      - missing_results
      - regenerate_before_publish

  fixed_team_match:
    title: Матч фиксированных команд
    participant_unit: pair_or_team
    capacity:
      organizer_enters_participant_capacity: true
      minimum_teams: 2
      derived_from_team_size_and_team_count: true
      organizer_confirms_final_capacity: true
      must_not_exceed_venue_limit: true
    configuration:
      best_of_sets: configurable
      points_per_set: configurable
      deciding_set_points: configurable
      side_change_rules: configurable
    scoring_ui:
      primary: set_score_table
      rows: sets
      columns:
      - fixed_team_a
      - fixed_team_b
      statistics:
      - match_winner
      - sets_won
      - points_for
      - points_against
      - point_difference

format_engine_rules:
- game_format controls one playable session, not the tournament progression.
- tournament and season formats may schedule matches that use standard_2x2 or another compatible game format.
- rotation_five may be used by a one-off game or by a season game day.
- participant_capacity is entered by the organizer and validated against format and venue constraints.
- published lineups cannot be silently regenerated.
- every lineup change after publication creates a notification and audit record.
- score UI uses a set table for team formats and round/court cards plus standings for rotation_five.
