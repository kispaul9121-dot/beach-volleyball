version: 7

formats:
  standard_2x2:
    title: 2×2
    participant_unit: individual_or_fixed_pair
    players_on_court: 4
    team_size: 2
    capacity:
      organizer_enters_participant_capacity: true
      minimum_players_per_court: 4
      may_exceed_active_players_for_rotation_or_reserve: true
      must_not_exceed_venue_limit: true
    lineup_modes:
      fixed_pairs:
        organizer_assigns_pairs: true
        auto_pairing_optional: true
        default_match_generation: round_robin
        example_six_players:
          players: 6
          pairs: 3
          matches: 3
          explanation: Каждая из трёх пар играет с двумя другими парами.
      manual:
        organizer_adds_matches_one_by_one: true
    configuration:
      sets_or_single_score: configurable
      points_per_set_or_match: configurable
      fixed_pairs: configurable
      rating_effect: configurable
    one_off_game_view:
      primary: match_table
      each_row:
      - match_number
      - pair_a
      - score
      - pair_b
      - result_status
      score_entry_permission: entity_owner_actor
      delegated_manager_score_view: read_only
      participant_score_view: read_only
      statistics:
      - played
      - wins
      - losses
      - points_for
      - points_against
      - point_difference

  standard_4x4:
    title: 4×4
    participant_unit: individual_or_fixed_team
    players_on_court: 8
    team_size: 4
    capacity:
      organizer_enters_participant_capacity: true
      minimum_players_per_court: 8
      may_exceed_active_players_for_substitutions_or_reserve: true
      must_not_exceed_venue_limit: true
    lineup_modes:
      fixed_teams:
        organizer_assigns_teams: true
        default_match_generation: round_robin_when_more_than_two_teams
        two_teams_generate_one_match: true
      manual:
        organizer_adds_matches_one_by_one: true
    configuration:
      sets_or_single_score: configurable
      points_per_set_or_match: configurable
      substitutions: configurable
      rating_effect: configurable
    one_off_game_view:
      primary: match_table
      each_row:
      - match_number
      - team_a
      - score
      - team_b
      - result_status
      score_entry_permission: entity_owner_actor
      delegated_manager_score_view: read_only
      participant_score_view: read_only
      statistics:
      - played
      - wins
      - losses
      - points_for
      - points_against
      - point_difference

  rotation_five:
    technical_id_status: legacy_name_kept_for_compatibility
    title: Смешанные пары
    aliases:
    - Ротация
    - Король площадки
    - Смешанные пары на 5
    participant_unit: individual
    players_on_court_per_match: 4
    team_size: 2
    capacity:
      organizer_enters_participant_capacity: true
      minimum_players: 4
      fixed_to_five: false
      exact_multiple_rule: none
      maximum_players: venue_capacity
      must_not_exceed_venue_limit: true
    generation:
      generated_match_count_formula: participant_count
      active_player_slots_formula: participant_count_times_4
      target_appearances_per_player: 4
      partner_repetitions: minimize
      opponent_repetitions: minimize
      waiting_time_distribution: balance
      simultaneous_matches_limited_by_reserved_courts: true
      no_player_on_two_courts_in_same_time_slot: true
    special_case_five_players:
      matches: 5
      appearances_per_player: 4
      each_player_rests_once: true
      every_pair_of_players_are_partners_once: true
    example_fifteen_players:
      players: 15
      matches: 15
      target_appearances_per_player: 4
    purpose: Система создаёт столько матчей, сколько введено участников, и равномерно перемешивает пары.
    per_game_configuration:
    - court_count
    - participant_capacity
    - points_per_match
    - scoring_model
    - initial_order
    - rating_effect
    results:
      supported_models:
        individual_points: Очки каждого игрока суммируются по матчам.
        wins_and_point_difference: Победы, затем разница очков.
        custom_season_points: Правило сезона.
    one_off_game_view:
      primary: match_table
      generated_rows_formula: participant_count
      each_row:
      - match_number
      - pair_a
      - score
      - pair_b
      - court_or_time_optional
      - result_status
      score_entry_permission: entity_owner_actor
      delegated_manager_score_view: read_only
      participant_score_view: read_only
      aggregate: individual_statistics_table
      statistics:
      - played
      - wins
      - points_for
      - points_against
      - point_difference
      - total_personal_points
      - rank
    generated_views:
      participant:
      - assigned_matches
      - partners
      - opponents
      - court_or_time
      - personal_points
      organizer:
      - all_match_rows
      - court_schedule
      - fairness_warnings
      - missing_results
      - regenerate_before_first_saved_result

  fixed_team_match:
    title: Матч фиксированных команд
    participant_unit: pair_or_team
    capacity:
      organizer_enters_participant_capacity: true
      minimum_teams: 2
      derived_from_team_size_and_team_count: true
      organizer_confirms_final_capacity: true
      must_not_exceed_venue_limit: true
    lineup_modes:
      fixed_teams:
        organizer_assigns_players: true
        two_teams_generate_one_match: true
        multiple_teams_default_match_generation: round_robin
      manual:
        organizer_adds_matches_one_by_one: true
    configuration:
      sets_or_single_score: configurable
      points_per_set_or_match: configurable
      deciding_set_points: configurable
      side_change_rules: configurable
    one_off_game_view:
      primary: match_table
      each_row:
      - match_number
      - fixed_team_a
      - score
      - fixed_team_b
      - result_status
      score_entry_permission: entity_owner_actor
      delegated_manager_score_view: read_only
      participant_score_view: read_only
      statistics:
      - played
      - wins
      - losses
      - points_for
      - points_against
      - point_difference

format_engine_rules:
- game_format controls one playable session, not tournament progression.
- every one-off game uses docs/GAME_MATCH_TABLE.yaml and displays a simple ordered match table.
- tournament and seasonal modes may use brackets, groups, schedules and rich visual maps through tournament-specific contracts.
- participant_capacity is entered by the organizer and validated against format and venue constraints.
- fixed pairs or teams generate a round-robin list by default when more than two sides exist.
- the technical id rotation_five now means generic mixed-pair rotation and is not limited to five players.
- mixed-pair rotation creates exactly participant_count match rows, including 15 rows for 15 players.
- the generator targets four appearances per player and balances partners, opponents and waiting time.
- only the owner actor that created the game can enter, change or publish scores in a one-off game.
- delegated managers, captains and participants can view published match rows and statistics but never receive score inputs.
- published lineups cannot be silently regenerated.
- every lineup change after publication creates a notification and audit record.
- one-off game statistics are derived from owner-organizer-saved rows in the match table.
