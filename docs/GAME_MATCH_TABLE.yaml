version: 4
scope: one_off_game_match_table
product_status: approved
source_of_truth_for:
- the always-present match list for a one-off game
- pre-generation of pairs, teams and matches
- strict organizer-only score and result entry
- statistics derived from organizer-saved match results
- separation between a simple game table and tournament visual brackets
principles:
- every one-off game has a match list even when only one match is planned
- a one-off game never uses a tournament bracket or decorative competition map
- the default mobile presentation is an ordered list of match rows
- the same match list is visible to participants and the organizer according to permissions
- only the owner actor that created the game can enter, change or publish a result
- delegated event managers, captains and ordinary participants never receive editable score fields
- statistics are calculated only from organizer-saved results
section:
  id: matches
  label: Матчи
  local_views:
  - matches
  - statistics
  local_view_labels:
    matches: Матчи
    statistics: Статистика
  default_view: matches
match_table:
  component: ResponsiveMatchTable
  mobile_presentation: compact_ordered_rows
  wide_presentation: table
  always_present: true
  columns:
  - sequence_or_round
  - court_or_time_optional
  - side_a
  - score_a
  - score_b
  - side_b
  - result_status
  row_example: '1 | Пара 1 | 21 : 17 | Пара 2 | Сохранено'
  score_fields:
    organizer_owner_view: editable_inline
    delegated_manager_view: read_only_text
    participant_view: read_only_text
    guest_view: read_only_when_public_policy_allows
  open_separate_match_screen_required: false
  tournament_bracket_forbidden: true
organizer_controls:
  permission: entity_owner_actor
  generate:
    label: Сформировать игры
    available_when: enough_confirmed_participants_and_lineup_mode_selected
  add_match:
    label: Добавить игру
    placement: directly_above_or_below_match_table
  enter_result:
    label: Ввести счёт
    presentation: inline_score_fields_in_match_row
  save_result:
    label: Сохранить
  edit_match: true
  delete_match:
    confirmation_required: true
  regenerate:
    allowed_before_first_saved_result: true
    after_first_saved_result: forbidden_without_full_reset_confirmation
    participant_change_after_generation_requires_review: true
lineup_modes:
  fixed_pairs:
    label: Фиксированные пары
    team_creation:
      organizer_assigns_players_to_pairs: true
      automatic_pairing_optional: true
    default_schedule: round_robin
    schedule_rule: every_pair_plays_every_other_pair_once
    example_six_players:
      pair_count: 3
      generated_match_count: 3
      explanation: Три пары играют круг между собой.
  fixed_teams:
    label: Фиксированные команды
    team_creation:
      organizer_assigns_players_to_teams: true
    default_schedule: round_robin_when_more_than_two_teams
    two_teams_result: one_initial_match
  rotation_five:
    technical_id_status: legacy_name_kept_for_compatibility
    product_label: Смешанные пары
    aliases:
    - Ротация
    - Король площадки
    - Смешанные пары на 5 игроков
    participant_count:
      minimum: 4
      maximum: venue_capacity
      fixed_to_five: false
      exact_multiple_rule: none
    generated_match_count_formula: participant_count
    active_players_per_match: 4
    teams_per_match: 2
    players_per_team: 2
    target_appearances_per_player: 4
    explanation: При N игроках создаётся N матчей. В N матчах есть 4N игровых мест, поэтому генератор распределяет по четыре участия на каждого игрока.
    balancing_goals:
    - each_player_appears_four_times
    - partner_repetitions_are_minimized
    - opponent_repetitions_are_minimized
    - consecutive_matches_and_long_waits_are_balanced
    - no_player_appears_twice_in_the_same_match
    - no_player_appears_on_two_courts_in_the_same_time_slot
    court_scheduling:
      total_match_rows_remains_participant_count: true
      simultaneous_matches_limited_by_reserved_court_count: true
      time_slots_generated_after_pairings: true
    special_case_five_players:
      generated_match_count: 5
      appearances_per_player: 4
      each_player_rests_exactly_once: true
      each_player_partners_each_other_player_exactly_once: true
    example_fifteen_players:
      participant_count: 15
      generated_match_count: 15
      target_appearances_per_player: 4
    presentation: participant_count_rows_in_the_same_match_table
  manual:
    label: Вручную
    use_case: organizer_builds_pairs_or_teams_and_adds_matches_one_by_one
    match_table_still_required: true
result_permissions:
  organizer_owner_actor:
    can_enter_any_match: true
    can_change_unsaved_result: true
    can_correct_saved_result_with_reason: true
    can_publish_statistics: true
  delegated_event_manager:
    can_enter: false
    can_confirm: false
    can_view_all_published_scores: true
  confirmed_participant:
    can_enter: false
    can_confirm: false
    can_dispute_inside_score_table: false
    can_view_all_published_scores: true
  guest_or_unconfirmed:
    can_enter: false
    can_view: public_score_visibility_follows_entity_policy
result_lifecycle:
  empty:
    label: Счёт не введён
    editable_by: entity_owner_actor
  editing:
    label: Не сохранено
    editable_by: entity_owner_actor
  saved:
    label: Сохранено
    recalculates_statistics: true
    publishes_system_message_to_game_chat: true
  correction:
    permission: entity_owner_actor
    reason_required: true
    audit_record_required: true
    recalculates_statistics: true
  participant_confirmation_required: false
  opposite_side_confirmation_required: false
  delegated_manager_confirmation_required: false
  participant_score_conflict_flow_forbidden: true
statistics:
  fixed_pair_or_team_table:
    columns:
    - rank
    - pair_or_team
    - played
    - wins
    - losses
    - points_for
    - points_against
    - point_difference
  mixed_pairs_individual_table:
    columns:
    - rank
    - player
    - played
    - wins
    - points_for
    - points_against
    - point_difference
    - personal_points_when_enabled
  ordering_and_tiebreaks:
  - wins_descending
  - point_difference_descending
  - points_for_descending
  - head_to_head_when_applicable
  provisional_label_until_all_required_results_saved: true
completion:
  required_match_rows_must_have_saved_result: true
  optional_manually_added_matches_may_be_excluded_by_organizer: true
  after_completion:
  - match_table_is_read_only_for_participants_and_delegated_managers
  - owner_actor_correction_remains_available_with_audit
  - final_statistics_are_saved
one_off_vs_tournament:
  one_off_game:
    presentation: simple_match_list_and_statistics_table
    bracket_or_visual_map: forbidden
  tournament:
    presentation: format_specific_schedule_bracket_groups_or_visual_competition_map
    inspiration_direction: rich_sports_event_visualization_similar_to_major_search_sports_widgets
    separate_contract: tournament_specs
accessibility:
  organizer_score_fields_have_side_and_match_number_in_label: true
  non_owner_result_is_announced_as_read_only: true
  result_status_is_textual: true
  table_reading_order_matches_visual_order: true
  horizontal_scroll_does_not_hide_current_score_context: true
