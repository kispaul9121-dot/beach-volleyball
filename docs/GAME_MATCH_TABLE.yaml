version: 1
scope: one_off_game_match_table
product_status: approved
source_of_truth_for:
- the always-present match list for a one-off game
- pre-generation of pairs, teams and matches
- score entry by confirmed participants
- result confirmation and conflict handling
- statistics derived from confirmed match scores
- separation between a simple game table and tournament visual brackets
principles:
- every one-off game has a match list even when only one match is planned
- a one-off game never uses a tournament bracket or decorative competition map
- the default mobile presentation is an ordered list of match rows
- the same match list is visible to participants and managers according to permissions
- confirmed participants can enter the score of matches in which they are assigned
- statistics are calculated only from confirmed results
section:
  id: matches
  label: Матчи
  replaces_old_label: Счёт
  local_views:
  - matches
  - statistics
  local_view_labels:
    matches: Матчи
    statistics: Статистика
  default_view: matches
match_table:
  component: ResponsiveMatchTable
  mobile_presentation: compact_ordered_rows
  wide_presentation: table
  always_present: true
  columns:
  - sequence_or_round
  - court_or_time_optional
  - side_a
  - score_a
  - score_b
  - side_b
  - result_status
  row_example: '1 | Пара 1 | 21 : 17 | Пара 2 | Подтверждено'
  score_inputs_live_in_row: true
  open_separate_match_screen_required: false
  tournament_bracket_forbidden: true
manager_controls:
  generate:
    label: Сформировать игры
    available_when: enough_confirmed_participants_and_lineup_mode_selected
  add_match:
    label: Добавить игру
    placement: directly_below_or_above_match_table
    permission: entity_manager
  edit_match:
    permission: entity_manager
  delete_match:
    permission: entity_manager
    confirmation_required: true
  regenerate:
    allowed_before_first_confirmed_score: true
    after_first_confirmed_score: forbidden_without_full_reset_confirmation
    participant_change_after_generation_requires_review: true
lineup_modes:
  fixed_pairs:
    label: Фиксированные пары
    team_creation:
      organizer_assigns_players_to_pairs: true
      automatic_pairing_optional: true
    default_schedule: round_robin
    schedule_rule: every_pair_plays_every_other_pair_once
    example_six_players:
      pair_count: 3
      generated_match_count: 3
      explanation: Три пары играют круг между собой.
  fixed_teams:
    label: Фиксированные команды
    team_creation:
      organizer_assigns_players_to_teams: true
    default_schedule: round_robin_when_more_than_two_teams
    two_teams_result: one_initial_match
  rotation_five:
    label: Смешанные пары на 5 игроков
    aliases:
    - Ротация пяти
    - Король площадки на 5
    players: 5
    generated_match_count: 5
    rounds: 5
    schedule_rules:
    - each_round_has_two_pairs_and_one_resting_player
    - each_player_rests_exactly_once
    - each_player_partners_each_other_player_exactly_once
    - no_player_appears_twice_in_one_round
    presentation: five_rows_in_the_same_match_table
  manual:
    label: Вручную
    use_case: organizer_builds_pairs_or_teams_and_adds_matches_one_by_one
    match_table_still_required: true
score_permissions:
  confirmed_participant:
    can_enter_when:
    - participant_is_assigned_to_side_a_or_side_b
    cannot_enter_for_other_matches: true
    can_view_all_published_scores: true
  entity_manager:
    can_enter_any_match: true
    can_correct_confirmed_result_with_reason: true
  guest_or_unconfirmed:
    can_enter: false
    public_score_visibility_follows_entity_policy: true
score_submission:
  initial_entry:
    status: awaiting_opponent_confirmation
    editable_by_submitter_until_confirmed: true
  confirmation:
    allowed_for:
    - participant_from_opposite_side
    - entity_manager
    matching_independent_submission_auto_confirms: true
  conflict:
    trigger: opposite_sides_submit_different_scores
    status: score_conflict
    show_both_submissions_to_manager: true
    resolution_requires:
    - manager_choice_or_corrected_score
    - audit_reason
  confirmed_result:
    locks_normal_participant_editing: true
    recalculates_statistics: true
    publishes_system_message_to_game_chat: true
statistics:
  fixed_pair_or_team_table:
    columns:
    - rank
    - pair_or_team
    - played
    - wins
    - losses
    - points_for
    - points_against
    - point_difference
  rotation_five_individual_table:
    columns:
    - rank
    - player
    - played
    - wins
    - points_for
    - points_against
    - point_difference
    - personal_points_when_enabled
  ordering_and_tiebreaks:
  - wins_descending
  - point_difference_descending
  - points_for_descending
  - head_to_head_when_applicable
  provisional_label_until_all_required_matches_confirmed: true
completion:
  required_match_rows_must_have_confirmed_result: true
  optional_manually_added_matches_may_be_excluded_by_manager: true
  after_completion:
  - match_table_becomes_read_only_for_participants
  - authorized_manager_correction_remains_available_with_audit
  - final_statistics_are_saved
one_off_vs_tournament:
  one_off_game:
    presentation: simple_match_list_and_statistics_table
    bracket_or_visual_map: forbidden
  tournament:
    presentation: format_specific_schedule_bracket_groups_or_visual_competition_map
    inspiration_direction: rich_sports_event_visualization_similar_to_major_search_sports_widgets
    separate_contract: tournament_specs
accessibility:
  score_fields_have_side_and_match_number_in_label: true
  result_status_is_textual: true
  table_reading_order_matches_visual_order: true
  horizontal_scroll_does_not_hide_current_score_context: true
