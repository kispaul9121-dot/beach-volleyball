version: 8
scope: game_mvp_creation_and_management
product_status: approved
source_of_truth_for:
- four-step game creation
- participant capacity input and venue limit
- MVP game management sections
- participant payment status and self-service pay action
- universal owner-organizer-managed match table and statistics for one-off games
- canonical game chat shared with Chats
creation:
  screen: game.create
  route: /games/create
  entry: /play?mode=manage&category=games
  persistent_header:
  - close
  - step_progress
  - active_creator_actor
  - autosave_status
  steps:
    1:
      title: Что и когда
      fields:
      - title
      - description_optional
      - starts_at
      - ends_at
      - timezone
      - visibility_public_or_private
    2:
      title: Место и формат
      fields:
      - venue_or_manual_address
      - reserved_court_count
      - game_format
      - participant_capacity
      - lineup_mode
      - planned_match_count_when_required
      participant_capacity:
        input: positive_integer_text_or_stepper
        entered_by_organizer: true
        auto_only_forbidden: true
        validation:
        - must_be_at_least_format_minimum
        - must_not_exceed_selected_venue_or_reserved_court_limit
        - must_respect_format_rule_when_applicable
      venue_limit:
        source_priority:
        - reserved_venue_slot_capacity
        - selected_venue_configured_player_limit
        - manual_address_organizer_declared_limit
        publish_blocked_when_exceeded: true
        copy: Выбранная площадка рассчитана максимум на {limit} игроков
      lineup_modes:
      - fixed_pairs
      - fixed_teams
      - rotation_five
      - manual
      format_capacity_rules:
        standard_2x2:
          minimum_players_per_court: 4
          capacity_can_exceed_active_players_for_rotation_or_reserve: true
        standard_4x4:
          minimum_players_per_court: 8
          capacity_can_exceed_active_players_for_substitutions_or_reserve: true
        rotation_five:
          product_label: Смешанные пары на 5 игроков
          exact_players: 5
          minimum_players: 5
          maximum_players: 5
          publish_blocked_when_not_exactly_five: true
          planned_match_count:
            entered_by_organizer: true
            input: positive_integer
            default: 15
            minimum: 1
            unique_compositions_before_repeats: 15
          larger_counts_destination: docs/TOURNAMENT_COURT_LADDER.yaml
        fixed_team_match:
          minimum_teams: 2
          participant_capacity_derived_from_team_size_but_confirmed_by_organizer: true
    3:
      title: Участие и цена
      contract: docs/JOIN_FLOW.yaml
      fields:
      - enrollment_policy
      - payment_policy
      - price_when_applicable
      - waitlist_enabled
      - participant_level_optional
      - participant_gender_optional
      - participant_age_optional
    4:
      title: Проверка и публикация
      blocks:
      - compact_event_preview
      - capacity_and_venue_validation
      - enrollment_and_payment_summary
      - format_lineup_and_match_count_summary
      - publish_errors
      primary_action: Опубликовать
      secondary_action: Сохранить черновик
  advanced_settings:
    presentation: collapsed_optional_section_inside_relevant_step
    separate_creation_step_forbidden: true
    examples:
    - points_per_match_or_set
    - rating_effect
    - match_generation_order
    - court_assignment
  return_policy:
    after_publish: /games/:gameId/manage
    after_save_and_close: /play?mode=manage&category=games
management:
  screen: game.manage
  route: /games/:gameId/manage
  sections:
  - overview
  - participants
  - matches
  - chat
  labels:
    overview: Обзор
    participants: Участники
    matches: Матчи
    chat: Чат
  forbidden_separate_sections:
  - settings
  - payments
  - tournament_bracket
  overview:
    shows:
    - publication_and_game_status
    - date_time_venue
    - format
    - participant_capacity_and_fill
    - enrollment_policy
    - price_or_free
    - match_generation_status
    - planned_match_count_when_applicable
    - attention_summary
    edit_core_game_action:
      label: Редактировать игру
      destination: game_core_edit_flow
  participants:
    source_of_truth: docs/JOIN_FLOW.yaml
    presentation: responsive_table_or_rows
    visible_to:
    - confirmed_participants
    - entity_managers
    columns_or_fields:
    - first_name
    - last_name
    - participation_status
    - payment_cell
    - pair_team_or_rotation_assignment
    payment_cell:
      public_status_for_confirmed_participants:
        paid: Оплачено
        unpaid_or_payment_required: Не оплачено
        free: Бесплатно
      own_row:
        online_unpaid:
          control: button
          label: Оплатить
          action_id: entity.open_payment
        processing:
          control: status
          label: Оплата обрабатывается
        paid:
          control: status
          label: Оплачено
        failed:
          control: button
          label: Повторить оплату
          action_id: entity.open_payment
        free:
          control: status
          label: Бесплатно
        external_unverified:
          control: status
          label: Не оплачено
          helper: Оплата организатору вне приложения
      other_rows:
        actions_forbidden: true
        shows_only_status: true
      after_success:
        replace_button_with_status: Оплачено
        preserve_cell_width: true
        update_visible_rows_realtime: true
      rules:
      - only_payment_owner_can_start_checkout
      - paying_for_another_participant_is_forbidden
      - guests_and_unconfirmed_users_do_not_see_payment_statuses
      - color_only_meaning_forbidden
    manager_edit_mode:
      entry_label: Редактировать
      actions:
      - Добавить игрока
      - Убрать игрока
      destructive_remove_requires_confirmation: true
      add_uses: player.picker
      payment_editing_forbidden: true
    pending_request_actions:
    - Подтвердить заявку
    - Отклонить заявку
    separate_payments_screen_for_mvp: false
  matches:
    source_of_truth: docs/GAME_MATCH_TABLE.yaml
    mandatory_for_every_one_off_game: true
    label: Матчи
    local_views:
    - matches
    - statistics
    default_view: matches
    presentation:
      mobile: compact_ordered_match_rows
      wide: table
    row_fields:
    - match_or_round_number
    - court_or_time_optional
    - side_a
    - score_a
    - score_b
    - side_b
    - result_status
    score_fields:
      entity_owner_actor: editable_inline
      delegated_event_manager: read_only
      confirmed_participant: read_only
      guest: read_only_when_public_policy_allows
    separate_match_screen_required: false
    organizer_actions:
    - Сформировать игры
    - Добавить игру
    - Ввести счёт
    - Сохранить результат
    - Изменить игру
    - Удалить игру
    organizer_action_permission: entity_owner_actor
    non_owner_permissions:
      delegated_manager_can_enter_score: false
      participant_can_enter_score: false
      participant_can_confirm_result: false
      participant_can_view_all_published_scores: true
    result_entry:
      permission: entity_owner_actor
      organizer_owner_only_ui: true
      save_directly_without_opponent_confirmation: true
      delegated_manager_entry_forbidden: true
      correction_requires_reason: true
      participant_conflict_flow_forbidden: true
    generation:
      fixed_pairs:
        default_schedule: round_robin
        example_six_players: three_pairs_and_three_matches
      fixed_teams:
        default_schedule: round_robin_when_more_than_two_teams
      rotation_five:
        product_label: Смешанные пары на 5 игроков
        exact_participant_count: 5
        planned_match_count_entered_by_organizer: true
        default_planned_match_count: 15
        generated_rows_formula: planned_match_count
        unique_cycle_match_count: 15
        when_less_than_fifteen: balanced_unique_subset
        when_exactly_fifteen: complete_unique_cycle
        when_more_than_fifteen: append_shuffled_repeat_cycles
        more_than_five_players_forbidden: true
        ten_or_fifteen_players_destination: docs/TOURNAMENT_COURT_LADDER.yaml
      manual:
        add_matches_one_by_one: true
    statistics:
      recalculation_trigger: organizer_owner_saved_result
      fixed_pairs_or_teams:
      - played
      - wins
      - losses
      - points_for
      - points_against
      - point_difference
      rotation_five_individual:
      - played
      - wins
      - points_for
      - points_against
      - point_difference
      - personal_points_when_enabled
      - rank
    tournament_visual_map_forbidden: true
  chat:
    mandatory_in_mvp: true
    conversation_identity: one_canonical_entity_chat
    embedded_in_game_manage: true
    also_visible_in_global_chats: true
    duplicate_conversation_creation_forbidden: true
    source_of_truth: docs/ENTITY_SECTIONS.yaml
    access:
    - confirmed_participants
    - entity_owner_actor
    - authorized_entity_staff
    pending_invitation_or_request_has_no_access: true
    system_messages:
    - participant_added
    - participant_removed
    - schedule_changed
    - venue_changed
    - payment_required
    - match_list_generated
    - result_saved_by_organizer_owner
    - result_corrected_by_organizer_owner
    - game_cancelled
completion:
  required_before_complete:
  - required_match_rows_have_saved_results
  - unresolved_critical_participant_state_acknowledged
  result:
  - game_moves_to_archive
  - chat_follows_completed_policy
  - statistics_become_read_only_except_owner_actor_correction
