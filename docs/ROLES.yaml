version: 2

note: Пользовательские профили описаны в ACTORS.yaml. Этот файл описывает разрешения внутри сущностей и организаций.

system_roles:
  authenticated_user:
    can:
      - manage_own_account
      - manage_own_actor_profiles
      - browse_public_entities
      - report_content

entity_relationship_roles:
  participant:
    can:
      - view_participant_content
      - view_own_payment
      - access_chat_when_policy_allows
      - cancel_own_participation_when_policy_allows

  creator_owner:
    can:
      - edit_entity
      - publish_entity
      - manage_participants
      - manage_schedule
      - manage_results
      - manage_chat
      - cancel_entity
      - transfer_ownership
      - view_audit_log

  entity_admin:
    can:
      - edit_entity
      - manage_participants
      - manage_schedule
      - manage_results
      - manage_chat
    cannot:
      - transfer_ownership
      - delete_financial_history

  scorekeeper:
    can:
      - view_internal_schedule
      - enter_results
      - correct_unconfirmed_results

  finance_manager:
    can:
      - view_entity_payments
      - issue_refunds
      - export_financial_report

  chat_moderator:
    can:
      - moderate_entity_chat
      - pin_messages
      - restrict_member

organization_membership_roles:
  owner:
    can: [all_organization_permissions]

  admin:
    can:
      - manage_organization_profile
      - manage_staff
      - manage_venues
      - create_and_manage_entities
      - view_finance

  event_manager:
    can:
      - create_entities_as_organization
      - manage_assigned_entities
      - communicate_with_participants

  trainer:
    can:
      - manage_assigned_trainings
      - manage_attendance
      - communicate_with_training_groups

  finance:
    can:
      - view_payments
      - manage_refunds
      - view_payouts
      - export_reports

  viewer:
    can:
      - view_internal_dashboards

platform_roles:
  support:
    can:
      - inspect_support_context
      - view_audit_metadata

  moderator:
    can:
      - review_reports
      - restrict_content
      - suspend_publication

  super_admin:
    can:
      - platform_administration

permission_rules:
  - actor_type alone never grants management of an entity; relationship or organization membership is also required.
  - switching active actor immediately recalculates permissions.
  - a player profile can own and manage entities it created.
  - trainer verification changes badges and financial capabilities, not ownership of already created drafts.
  - every organizer override must store acting_user_id and acting_actor_id.
