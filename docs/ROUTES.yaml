  - round
  back_fallback: /play?category=tournaments
- path: /tournaments/:tournamentId/manage
  screen: tournament.manage
  navigator: entity_stack
  permission: entity_manager
  accepts_query:
  - tab
  - round
  back_fallback: /profile/competitions?tab=organized
- path: /matches/:matchId
  screen: competition.match
  navigator: entity_stack
  access: public_preview_or_authenticated
  back_fallback: /play
- path: /seasons/create
  screen: season.create
  navigator: modal_stack
  access: authenticated_onboarded
  accepts_query:
  - returnTo
  - actorId
  - draftId
  - templateId
  back_fallback: /profile/competitions
- path: /seasons/:seasonId
  screen: season.details
  navigator: entity_stack
  access: public_preview_or_authenticated
  accepts_query:
  - tab
  - gameDayId
  back_fallback: /play?category=seasons
- path: /seasons/:seasonId/manage
  screen: season.manage
  navigator: entity_stack
  permission: entity_manager
  accepts_query:
  - tab
  - gameDayId
  back_fallback: /profile/competitions?tab=organized
- path: /seasons/:seasonId/game-days/:gameDayId
  screen: season.game_day
  navigator: entity_stack
  access: public_preview_or_authenticated
  accepts_query:
  - tab
  - round
  back_fallback: /seasons/:seasonId
- path: /seasons/:seasonId/game-days/:gameDayId/manage
  screen: season.game_day_manage
  navigator: entity_stack
