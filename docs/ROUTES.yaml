  back_fallback: /profile/trips?tab=organized
- path: /tours/:tourId/booking
  screen: tour.booking
  navigator: modal_stack
  access: authenticated_onboarded
  back_fallback: /tours/:tourId
- path: /clubs/:clubId
  screen: club.details
  navigator: entity_stack
  access: public_preview_or_authenticated
  accepts_query:
  - tab
  back_fallback: /clubs
- path: /clubs/:clubId/manage
  screen: club.manage
  navigator: entity_stack
