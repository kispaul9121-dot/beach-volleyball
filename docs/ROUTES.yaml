version: 2
route_rules:
- unauthenticated users are redirected to /auth except public deep links that may show a preview
- authenticated users with incomplete onboarding are redirected to the next onboarding step
- tab routes preserve their own navigation stacks
- entity detail routes are canonical and shared by all entry points
- create routes accept returnTo and optional actorId
- manage routes require relationship or organization permission
- deep links use back_fallback when navigation history is empty
routes:
- path: /auth
  screen: auth.welcome
  navigator: auth_stack
  access: signed_out
- path: /auth/sign-in
  screen: auth.sign_in
  navigator: auth_stack
  access: signed_out
  back_fallback: /auth
- path: /auth/register
  screen: auth.email_registration
  navigator: auth_stack
  access: signed_out
  back_fallback: /auth
- path: /auth/verify
  screen: auth.verify_email
  navigator: auth_stack
  access: pending_email_verification
  back_fallback: /auth
- path: /auth/reset-password
  screen: auth.reset_password
  navigator: auth_stack
  access: signed_out
  back_fallback: /auth/sign-in
- path: /onboarding/profiles
  screen: onboarding.profile_selection
  navigator: onboarding_stack
  access: authenticated_incomplete_onboarding
- path: /onboarding/player
  screen: onboarding.player
  navigator: onboarding_stack
  access: authenticated_incomplete_onboarding
  back_fallback: /onboarding/profiles
- path: /onboarding/trainer
  screen: onboarding.trainer
  navigator: onboarding_stack
  access: authenticated
  back_fallback: /onboarding/player
- path: /onboarding/organization
  screen: onboarding.organization
  navigator: onboarding_stack
  access: authenticated
  back_fallback: /onboarding/player
- path: /onboarding/permissions
  screen: onboarding.permissions
  navigator: onboarding_stack
  access: authenticated
  back_fallback: /onboarding/player
- path: /notifications
  screen: global.notifications
  navigator: global_stack
  access: authenticated
  back_fallback: /
- path: system://actor-switcher
  screen: actor.switcher
  navigator: bottom_sheet
  access: authenticated
  back_fallback: system://dismiss
- path: system://player-picker
  screen: player.picker
  navigator: modal_stack
  access: authenticated
  permission: entity_inviter
  accepts_query:
  - entityType
  - entityId
  - draftId
  - actorId
  - returnTo
  back_fallback: system://dismiss
- path: /
  screen: home.main
  navigator: tab
  access: authenticated_onboarded
- path: /play
  screen: play.main
  navigator: tab
  access: authenticated_onboarded
  accepts_query:
  - category
  - managed
  - date
  - actorId
  - trainerId
- path: /chats
  screen: chats.main
  navigator: tab
  access: authenticated_onboarded
  accepts_query:
  - category
  - unread
  - actorId
- path: /clubs
  screen: clubs.main
  navigator: tab
  access: public_preview_or_authenticated
  accepts_query:
  - category
  - city
  - actorId
- path: /profile
  screen: profile.main
  navigator: tab
  access: authenticated_onboarded
  accepts_query:
  - actorId
- path: /profile/actors
  screen: profile.actor_profiles
  navigator: profile_stack
  parent: /profile
  back_fallback: /profile
- path: /profile/calendar
  screen: profile.calendar
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - view
  - date
  - scope
  - actorId
  back_fallback: /profile
- path: /profile/games
  screen: profile.my_games
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - tab
  - status
  - actorId
  back_fallback: /profile
- path: /profile/competitions
  screen: profile.competitions
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - tab
  - type
  - status
  - actorId
  back_fallback: /profile
- path: /profile/trainings
  screen: profile.trainings
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - tab
  - status
  - actorId
  back_fallback: /profile
- path: /profile/players
  screen: profile.players
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - mode
  - entityType
  - entityId
  - actorId
  back_fallback: /profile
- path: /profile/trips
  screen: profile.trips
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - tab
  - status
  - actorId
  back_fallback: /profile
- path: /profile/statistics
  screen: profile.statistics
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - period
  - actorId
  back_fallback: /profile
- path: /profile/payments
  screen: profile.payments
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - tab
  - status
  - actorId
  back_fallback: /profile
- path: /profile/settings
  screen: profile.settings
  navigator: profile_stack
  parent: /profile
  accepts_query:
  - section
  - actorId
  back_fallback: /profile
- path: /games/create
  screen: game.create
  navigator: modal_stack
  access: authenticated_onboarded
  accepts_query:
  - returnTo
  - actorId
  - draftId
  - templateId
  back_fallback: /play?category=games
- path: /games/:gameId
  screen: game.details
  navigator: entity_stack
  access: public_preview_or_authenticated
  back_fallback: /play?category=games
- path: /games/:gameId/manage
  screen: game.manage
  navigator: entity_stack
  permission: entity_manager
  accepts_query:
  - tab
  back_fallback: /profile/games?tab=created
- path: /trainings/create
  screen: training.create
  navigator: modal_stack
  permission: trainer_or_organization
  accepts_query:
  - returnTo
  - actorId
  - draftId
  - templateId
  back_fallback: /profile/trainings
- path: /trainings/:trainingId
  screen: training.details
  navigator: entity_stack
  access: public_preview_or_authenticated
  back_fallback: /play?category=trainings
- path: /trainings/:trainingId/manage
  screen: training.manage
  navigator: entity_stack
  permission: entity_manager
  accepts_query:
  - tab
  back_fallback: /profile/trainings?tab=created
- path: /trainings/:trainingId/attendance
  screen: training.attendance
  navigator: entity_stack
  permission: training_manager
  back_fallback: /trainings/:trainingId/manage?tab=attendance
- path: /tournaments/create
  screen: tournament.create
  navigator: modal_stack
  access: authenticated_onboarded
  accepts_query:
  - returnTo
