version: 2
scope: tournament_tunisian_court_ladder
product_status: approved
source_of_truth_for:
- Russian product naming of the Tunisian format
- 10-player and 15-player tournaments on two or three courts
- movement of leaders upward and last-place players downward
- separation from the one-court five-player game
research_note:
  russian_community_term: Тунисский формат
  official_fivb_or_vfv_standard: false
  international_generic_description: court ladder tournament
  rule_variation_warning: community implementations differ, so the application must show the exact configured rules
format:
  id: tunisian_court_ladder
  product_label: Тунисский формат
  subtitle: Лестница по площадкам
  entity_type: tournament
  participant_unit: individual
  minimum_court_count: 2
  supported_mvp_configurations:
    ten_players:
      participant_count: 10
      court_count: 2
      players_per_court: 5
    fifteen_players:
      participant_count: 15
      court_count: 3
      players_per_court: 5
  other_participant_counts_in_mvp_forbidden: true
  one_court_destination:
    entity_type: game
    format: rotation_five
    contract: docs/GAME_MATCH_TABLE.yaml
terminology:
  court: Площадка
  colloquial_alias: Сетка
  top_court: Верхняя площадка
  bottom_court: Нижняя площадка
  higher_court_has_better_rank: true
initial_distribution:
  methods:
  - manual
  - rating
  - random
  requirement: exactly_five_players_per_court
cycle:
  label: Цикл
  planned_match_count_per_court:
    entered_by_organizer: true
    input: positive_integer
    default: 15
    minimum: 1
    unique_five_player_cycle_match_count: 15
  pairing_engine: five_player_mixed_pairs
  source_contract: docs/GAME_MATCH_TABLE.yaml
  generation:
    fewer_than_fifteen: balanced_unique_subset
    exactly_fifteen: all_unique_match_compositions_once
    more_than_fifteen: append_shuffled_repeat_cycles
  full_fifteen_match_cycle_properties:
  - each_player_plays_12_matches
  - each_player_rests_3_times
  - each_player_partners_every_other_player_3_times
  results_create_individual_table_per_court: true
movement_after_cycle:
  enabled: true
  calculation_basis: final_individual_table_of_completed_cycle
  movement_count_per_boundary: 1
  upward:
    source: rank_1_of_lower_court
    destination: next_higher_court
    label: Лидер поднимается
  downward:
    source: rank_5_of_higher_court
    destination: next_lower_court
    label: Последний опускается
  simultaneous_across_boundaries: true
  two_court_example:
  - leader_of_court_2_moves_to_court_1
  - last_place_of_court_1_moves_to_court_2
  three_court_example:
  - leader_of_court_3_moves_to_court_2
  - last_place_of_court_2_moves_to_court_3
  - leader_of_court_2_moves_to_court_1
  - last_place_of_court_1_moves_to_court_2
  edge_rules:
  - leader_of_top_court_stays_on_top_court
  - last_place_of_bottom_court_stays_on_bottom_court
  - moved_players_replace_each_other_across_each_boundary
  - next_cycle_pairings_are_regenerated_after_movement
rounds:
  organizer_enters_cycle_count: true
  minimum_cycles: 1
  next_cycle_requires_all_required_results_saved: true
  movement_preview_before_publish: true
  organizer_confirms_movement_before_next_cycle: true
standings:
  per_court:
  - rank
  - player
  - played
  - wins
  - points_for
  - points_against
  - point_difference
  tiebreaks:
  - wins_descending
  - point_difference_descending
  - points_for_descending
  final_order:
  - court_priority_top_to_bottom
  - rank_inside_final_court
visualization:
  public_and_participant_view: stacked_court_cards
  title: Тунисский формат
  each_court_card_shows:
  - five_players
  - configured_cycle_matches
  - current_individual_table
  - upward_and_downward_movement_arrows_after_completed_cycle
  rich_map_contract: docs/TOURNAMENT_VISUAL_MAP.yaml
  one_off_match_table_contract_not_used_as_tournament_root: docs/GAME_MATCH_TABLE.yaml
management:
  organizer_actions:
  - distribute_players
  - set_matches_per_cycle
  - generate_cycle
  - enter_results
  - preview_movements
  - confirm_movements
  - publish_next_cycle
  participant_result_entry_forbidden: true
  delegated_roles_follow_tournament_permissions: true
copy:
  explanation: Пять игроков на каждой площадке играют смешанными парами. После цикла лидер нижней площадки поднимается выше, а последний игрок верхней площадки опускается ниже.
  one_court_explanation: Одна площадка на пять игроков создаётся как разовая игра, а не турнир.
accessibility:
  movement_arrows_have_text_equivalent: true
  screen_reader_announces_source_court_destination_court_and_reason: true
  color_only_court_rank_forbidden: true
